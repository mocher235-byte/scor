<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金名雲端即時加分系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .bg-dashed {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='32' ry='32' stroke='%23CBD5E1' stroke-width='4' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        }
    </style>
</head>
<body class="bg-[#F0F9FF]">
    <div id="root">
        <div class="loading-overlay">正在啟動金名系統...</div>
    </div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Firebase 模組匯入 ---
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, onSnapshot, updateDoc, addDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDcZH07By0OdVohwgpg_pqzGgvKnDmgE9U",
            authDomain: "jinming-scor.firebaseapp.com",
            projectId: "jinming-scor",
            storageBucket: "jinming-scor.firebasestorage.app",
            messagingSenderId: "889733738388",
            appId: "1:889733738388:web:9f60e3da488ec338b9a981",
            measurementId: "G-YKNJ69QNN1"
        };

        const appId = "jinming-main-v2"; 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const LOGO_URL_PRIMARY = "https://blogger.googleusercontent.com/img/a/AVvXsEjRqKCNWrsH37nthSraJgRc4iUslqv0Pw0urBa9ZwTuV3CLiliGNWjV3EddlJwJ7ox07Uol5GQL77Msjqw-_MUrwQIS6E7iHsdc-RaogP2TVjkJmZ1IkGSrX4ZCLfiZmapAPl5PyxovhZwtsxh080ROmCTJWQcbdtBMAAYIlO-BIsofB7tRYNn0ZZTHEgM";

        const SOUNDS = {
            plus: "https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3", 
            minus: "https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3" 
        };

        const PRESET_CONFIG = {
            '2812': {
                title: "金名補習班-總管理",
                branchId: "branch_2812_v2",
                classes: [
                    { name: "奧林匹克資優數學", members: ["宗佑", "詠甯", "仲愷", "宸皜", "Peggy", "Rey"] },
                    { name: "升私中特訓班國語科", members: ["陳品蓁", "楊恩煦", "謝建霆", "黃晨瑋", "李昱泓", "陳宥樺", "田穎莙", "徐承佑"] },
                    { name: "升私中特訓班數學科", members: ["陳品蓁", "楊恩煦", "謝建霆", "黃晨瑋", "李昱泓", "徐廷芝", "陳宥樺", "田穎莙", "周軒芃", "徐承佑"] },
                    { name: "升私中特訓班英文科", members: ["陳品蓁", "蔡和蓁", "楊恩煦", "謝建霆", "黃晨瑋", "李昱泓", "徐廷芝", "田穎莙"] },
                    { name: "金名 9 數", members: ["鄭喬勻", "邱繹帆"] },
                    { name: "金名 8 數", members: ["陳禹彤", "黃湘晴", "張筑媛", "呂柏漢", "陳韋彤", "陳盈築", "劉宗祐", "林荷悅", "彭宣銘", "池書帆"] }
                ]
            },
            '60800': {
                title: "升私中-國語班",
                branchId: "branch_60800",
                classes: [
                    { name: "升私中特訓班國語科", members: ["陳品蓁", "楊恩煦", "謝建霆", "黃晨瑋", "李昱泓", "陳宥樺", "田穎莙", "徐承佑"] }
                ]
            },
            '60900': {
                title: "升私中-數學班",
                branchId: "branch_60900",
                classes: [
                    { name: "升私中特訓班數學科", members: ["陳品蓁", "楊恩煦", "謝建霆", "黃晨瑋", "李昱泓", "徐廷芝", "陳宥樺", "田穎莙", "周軒芃", "徐承佑"] }
                ]
            },
            '61240': {
                title: "升私中-英文班",
                branchId: "branch_61240",
                classes: [
                    { name: "升私中特訓班英文科", members: ["陳品蓁", "蔡和蓁", "楊恩煦", "謝建霆", "黃晨瑋", "李昱泓", "徐廷芝", "田穎莙"] }
                ]
            }
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
                list: <><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></>,
                grid: <><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></>,
                plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
                rotate: <><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></>,
                camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
                logout: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></>,
                chevronRight: <path d="m9 18 6-6-6-6"/>,
                calendarX: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><line x1="10" x2="14" y1="14" y2="18"/><line x1="14" x2="10" y1="14" y2="18"/></>,
                userCheck: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></>,
                x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" x2="6" y1="6" x2="18" y2="18"/></>,
                trash: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const NavItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`flex flex-col md:flex-row items-center justify-center gap-1 md:gap-4 flex-1 md:flex-none md:w-full py-2 md:py-4 transition-all rounded-2xl ${active ? 'bg-[#E60012] text-white shadow-lg' : 'text-slate-300 hover:bg-slate-50'}`}>
                <Icon name={icon} size={24} />
                <span className="text-[10px] md:text-sm font-black">{label}</span>
            </button>
        );

        const maskName = (name) => (!name || name.length < 2) ? name : name.substring(1);
        const getFormattedDate = () => {
            const date = new Date();
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}(${days[date.getDay()]})`;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [appMode, setAppMode] = useState(null);
            const [password, setPassword] = useState('');
            const [currentConfig, setCurrentConfig] = useState(null);
            const [classes, setClasses] = useState([]);
            const [currentClassId, setCurrentClassId] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [isCapturing, setIsCapturing] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showAddClassModal, setShowAddClassModal] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [memberToDelete, setMemberToDelete] = useState(null);
            const [classToDelete, setClassToDelete] = useState(null);
            const [newMemberName, setNewMemberName] = useState('');
            const [newClassName, setNewClassName] = useState('');
            
            const rootRef = useRef(null);
            const initializedRef = useRef(null);

            const currentClass = useMemo(() => classes.find(c => c.id === currentClassId), [classes, currentClassId]);

            const playSoundEffect = (isPositive) => {
                try {
                    const audio = new Audio(isPositive ? SOUNDS.plus : SOUNDS.minus);
                    audio.volume = 1.0; 
                    audio.play().catch(err => console.log("Audio play blocked", err));
                } catch (e) {
                    console.error("Audio error", e);
                }
            };

            useEffect(() => {
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } catch (e) { console.error("登入失敗", e); }
                };
                initAuth();
                return onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
            }, []);

            useEffect(() => {
                if (!appMode || !currentConfig || !user) return;
                const classesRef = collection(db, 'artifacts', appId, 'public', 'data', 'classes');
                const branchKey = currentConfig.branchId;

                const unsubscribe = onSnapshot(classesRef, async (snapshot) => {
                    const allData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const filtered = allData.filter(c => c.branchId === branchKey);
                    
                    if (appMode === 'preset' && filtered.length === 0 && initializedRef.current !== branchKey) {
                        initializedRef.current = branchKey;
                        setLoading(true);
                        for (let i = 0; i < currentConfig.classes.length; i++) {
                            const cls = currentConfig.classes[i];
                            const members = cls.members.map((name, mIdx) => ({
                                id: `${Date.now()}_${i}_${mIdx}_${Math.random().toString(36).substr(2, 5)}`,
                                name, points: 0, isAbsent: false,
                                emoji: ["🦁", "🎨", "🦖", "🦊", "🎮", "🚀", "🐼", "🐨", "🦉", "🐯", "🐶", "🦁", "🎨", "🚀"][Math.floor(Math.random() * 14)]
                            }));
                            await addDoc(classesRef, { name: cls.name, branchId: branchKey, members, history: [], createdAt: Date.now() + i });
                        }
                        setLoading(false);
                    }
                    setClasses(filtered.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)));
                }, (err) => console.error("Firestore Error:", err));
                return () => unsubscribe();
            }, [appMode, currentConfig, user]);

            const handleLogin = (e) => {
                e.preventDefault();
                const config = PRESET_CONFIG[password] || { title: "臨時系統", branchId: "temp_" + Date.now(), classes: [] };
                setCurrentConfig(config);
                setAppMode(PRESET_CONFIG[password] ? 'preset' : 'temporary');
                setActiveTab('class_manager');
            };

            const handleAdjustPoints = async (memberId, amount) => {
                if (!currentClass || !db) return;
                const member = currentClass.members.find(m => m.id === memberId);
                if (!member || member.isAbsent) return;
                
                playSoundEffect(amount > 0);

                const updatedMembers = currentClass.members.map(m => m.id === memberId ? { ...m, points: Math.max(0, (m.points || 0) + amount) } : m);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'classes', currentClassId), {
                    members: updatedMembers,
                    history: [{ id: Date.now(), memberName: member.name, amount, reason: "表現優秀", timestamp: new Date().toLocaleString() }, ...(currentClass.history || [])].slice(0, 20)
                });
            };

            const handleResetPoints = async () => {
                if (!currentClass || !db) return;
                const updatedMembers = currentClass.members.map(m => ({ ...m, points: 0 }));
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'classes', currentClassId), {
                    members: updatedMembers,
                    history: [{ id: Date.now(), memberName: "全體同學", amount: 0, reason: "全班歸零", timestamp: new Date().toLocaleString() }, ...(currentClass.history || [])].slice(0, 20)
                });
                setShowResetConfirm(false);
            };

            const handleToggleAbsent = async (memberId) => {
                if (!currentClass || !db) return;
                const updatedMembers = currentClass.members.map(m => m.id === memberId ? { ...m, isAbsent: !m.isAbsent } : m);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'classes', currentClassId), { members: updatedMembers });
            };

            const handleAddMember = async () => {
                if (!newMemberName.trim() || !currentClassId || !db) return;
                const newMember = {
                    id: `manual_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
                    name: newMemberName.trim(),
                    points: 0,
                    isAbsent: false,
                    emoji: ["🦁", "🎨", "🦖", "🦊", "🎮", "🚀", "🐼", "🐨", "🦉", "🐯", "🐶", "🐱", "🐰", "🦁"][Math.floor(Math.random() * 14)]
                };
                const updatedMembers = [...currentClass.members, newMember];
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'classes', currentClassId), { 
                    members: updatedMembers,
                    history: [{ id: Date.now(), memberName: newMemberName.trim(), amount: 0, reason: "新學員加入", timestamp: new Date().toLocaleString() }, ...(currentClass.history || [])].slice(0, 20)
                });
                setNewMemberName('');
                setShowAddModal(false);
            };

            const handleDeleteMember = async () => {
                if (!memberToDelete || !currentClassId || !db) return;
                const updatedMembers = currentClass.members.filter(m => m.id !== memberToDelete.id);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'classes', currentClassId), { 
                    members: updatedMembers,
                    history: [{ id: Date.now(), memberName: memberToDelete.name, amount: 0, reason: "移除學員", timestamp: new Date().toLocaleString() }, ...(currentClass.history || [])].slice(0, 20)
                });
                setMemberToDelete(null);
            };

            const handleAddClass = async () => {
                if (!newClassName.trim() || !currentConfig || !db) return;
                const classesRef = collection(db, 'artifacts', appId, 'public', 'data', 'classes');
                await addDoc(classesRef, {
                    name: newClassName.trim(),
                    branchId: currentConfig.branchId,
                    members: [],
                    history: [],
                    createdAt: Date.now()
                });
                setNewClassName('');
                setShowAddClassModal(false);
            };

            const handleDeleteClass = async () => {
                if (!classToDelete || !db) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'classes', classToDelete.id));
                if (currentClassId === classToDelete.id) setCurrentClassId(null);
                setClassToDelete(null);
            };

            const handleCapture = async () => {
                if (!rootRef.current) return;
                setIsCapturing(true);
                setTimeout(async () => {
                    const canvas = await html2canvas(rootRef.current, { backgroundColor: "#F0F9FF", scale: 2 });
                    const link = document.createElement('a');
                    link.download = `金名學習報_${currentClass?.name}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                    setIsCapturing(false);
                }, 500);
            };

            if (!appMode) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#F0F9FF]">
                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl border-t-[12px] border-[#E60012] w-full max-w-md animate-in zoom-in">
                            <div className="text-center mb-8">
                                <img src={LOGO_URL_PRIMARY} className="w-24 h-24 mx-auto mb-6 rounded-full border-4 border-yellow-400 shadow-lg" />
                                <h1 className="text-2xl font-black text-[#0068B7] italic">金名雲端即時加分系統</h1>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-6">
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="請輸入分校密碼..." className="w-full px-6 py-4 rounded-2xl bg-slate-50 border-4 border-transparent focus:border-yellow-400 outline-none font-bold text-lg" />
                                <button className="w-full bg-[#E60012] text-white py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">進入系統</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div ref={rootRef} className={`min-h-screen flex flex-col ${isCapturing ? 'h-auto' : 'h-screen'}`}>
                    {!isCapturing && (
                        <nav className="fixed bottom-0 left-0 right-0 h-20 md:top-0 md:left-0 md:w-24 md:h-full bg-white border-t md:border-r-4 border-yellow-400 z-50 flex md:flex-col justify-around items-center p-2 shadow-xl">
                            <NavItem icon="users" label="學員" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                            <NavItem icon="trophy" label="排行" active={activeTab === 'leaderboard'} onClick={() => setActiveTab('leaderboard')} />
                            <NavItem icon="list" label="紀錄" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />
                            <NavItem icon="grid" label="班級" active={activeTab === 'class_manager'} onClick={() => setActiveTab('class_manager')} />
                        </nav>
                    )}

                    <main className={`flex-1 flex flex-col md:ml-24 ${isCapturing ? 'p-10 bg-[#F0F9FF]' : 'overflow-hidden'}`}>
                        <header className="p-6 flex flex-col md:flex-row justify-between items-center gap-4 bg-white/50 backdrop-blur-md">
                            <div className="flex items-center gap-4">
                                <img src={LOGO_URL_PRIMARY} className="w-12 h-12 rounded-full border-2 border-yellow-400 shadow-sm" />
                                <div>
                                    <h1 className="text-xl font-black text-[#0068B7] tracking-tight">{currentConfig.title}</h1>
                                    <div className="text-xs text-slate-500 font-bold">{getFormattedDate()} {currentClass ? `| ${currentClass.name}` : ''}</div>
                                </div>
                            </div>
                            {!isCapturing && (
                                <div className="flex gap-2">
                                    {currentClassId && (
                                        <button onClick={() => setShowResetConfirm(true)} className="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-black flex items-center gap-2 border border-red-200 hover:bg-red-600 hover:text-white transition-all shadow-sm">
                                            <Icon name="trash" size={16}/> 歸零
                                        </button>
                                    )}
                                    {activeTab === 'leaderboard' && currentClassId && <button onClick={handleCapture} className="bg-sky-600 text-white px-4 py-2 rounded-xl text-sm font-black flex items-center gap-2 shadow-md"><Icon name="camera" size={16}/> 截圖</button>}
                                    <button onClick={() => location.reload()} className="p-2 text-slate-400 hover:text-red-500"><Icon name="logout" size={20}/></button>
                                </div>
                            )}
                        </header>

                        <div className={`flex-1 p-4 md:p-8 ${isCapturing ? '' : 'overflow-y-auto no-scrollbar'}`}>
                            {(!currentClassId || activeTab === 'class_manager') ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in fade-in">
                                    {classes.map(c => (
                                        <div key={c.id} className="relative group">
                                            <div onClick={() => { setCurrentClassId(c.id); setActiveTab('dashboard'); }} className="bg-white p-8 rounded-[2.5rem] border-4 border-white hover:border-yellow-400 shadow-xl cursor-pointer transition-all hover:scale-105 text-center flex flex-col items-center">
                                                <div className="text-5xl mb-4 group-hover:rotate-12 transition-transform">🏫</div>
                                                <h3 className="text-xl font-black text-[#0068B7] leading-tight">{c.name}</h3>
                                                <div className="mt-4 pt-4 border-t w-full text-sm font-bold text-sky-600 flex justify-between">進入管理 <Icon name="chevronRight" size={16}/></div>
                                            </div>
                                            <button onClick={() => setClassToDelete(c)} className="absolute top-4 right-4 p-2 bg-slate-50 text-slate-300 rounded-full hover:bg-red-500 hover:text-white opacity-0 group-hover:opacity-100 transition-all">
                                                <Icon name="trash" size={16} />
                                            </button>
                                        </div>
                                    ))}
                                    <div onClick={() => setShowAddClassModal(true)} className="bg-dashed p-8 rounded-[2.5rem] flex flex-col items-center justify-center cursor-pointer hover:bg-sky-50 transition-all min-h-[200px] group">
                                        <div className="text-5xl text-slate-300 group-hover:scale-125 transition-transform mb-2">🏫+</div>
                                        <div className="font-black text-slate-400 text-lg">新增班級</div>
                                    </div>
                                </div>
                            ) : (
                                <div className="animate-in fade-in">
                                    {activeTab === 'dashboard' && (
                                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                                            {currentClass.members.map(m => (
                                                <div key={m.id} className={`bg-white p-4 rounded-[2rem] shadow-lg border-4 transition-all flex flex-col items-center relative ${m.isAbsent ? 'opacity-40 grayscale border-slate-200' : 'border-yellow-400 hover:border-[#0068B7]'}`}>
                                                    {!isCapturing && (
                                                        <div className="absolute top-2 left-2 right-2 flex justify-between items-center w-[calc(100%-1rem)]">
                                                            <button onClick={() => setMemberToDelete(m)} className="p-1.5 rounded-full bg-slate-100 text-slate-400 hover:bg-red-500 hover:text-white transition-colors">
                                                                <Icon name="trash" size={14} />
                                                            </button>
                                                            <button onClick={() => handleToggleAbsent(m.id)} className={`p-1.5 rounded-full ${m.isAbsent ? 'bg-red-500 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                                <Icon name={m.isAbsent ? "calendarX" : "userCheck"} size={16} />
                                                            </button>
                                                        </div>
                                                    )}
                                                    <div className="text-4xl mt-4 mb-2 bg-slate-50 w-20 h-20 rounded-2xl flex items-center justify-center border-2 border-white shadow-inner">{m.isAbsent ? "💤" : m.emoji}</div>
                                                    <div className="font-black text-lg mb-1 truncate w-full text-center leading-[1.6]">{isCapturing ? maskName(m.name) : m.name}</div>
                                                    <div className={`${m.isAbsent ? 'bg-slate-300' : 'bg-[#E60012]'} text-white px-3 py-1 rounded-full text-xs font-black mb-4`}>⭐ {m.points}</div>
                                                    {!isCapturing && (
                                                        <div className="grid grid-cols-2 gap-2 w-full">
                                                            {[1, 5, 10, 20].map(v => (
                                                                <button key={v} disabled={m.isAbsent} onClick={() => handleAdjustPoints(m.id, v)} className={`text-white text-xs font-black py-2 rounded-lg ${m.isAbsent ? 'bg-slate-200' : 'bg-sky-600 active:scale-90 transition-transform'}`}>+{v}</button>
                                                            ))}
                                                            <button disabled={m.isAbsent} onClick={() => handleAdjustPoints(m.id, -1)} className={`text-xs font-black py-2 rounded-lg border-2 active:scale-90 transition-transform ${m.isAbsent ? 'border-slate-200 text-slate-200' : 'border-red-500 text-red-500'}`}>-1</button>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                            {!isCapturing && (
                                                <div onClick={() => setShowAddModal(true)} className="bg-dashed p-4 rounded-[2rem] flex flex-col items-center justify-center cursor-pointer hover:bg-sky-50 transition-all min-h-[220px] group">
                                                    <div className="text-5xl text-slate-300 group-hover:scale-125 transition-transform mb-2">👤+</div>
                                                    <div className="font-black text-slate-400 text-lg">新增學員</div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                    {activeTab === 'leaderboard' && (
                                        <div className="bg-white rounded-[3rem] p-8 shadow-2xl max-w-3xl mx-auto border-b-[12px] border-yellow-400">
                                            <div className="space-y-4">
                                                {[...currentClass.members].sort((a,b) => b.points - a.points).map((m, i) => (
                                                    <div key={m.id} className={`flex items-center gap-6 p-6 rounded-[2rem] ${i === 0 ? 'bg-yellow-50 border-4 border-yellow-400 scale-105' : 'bg-slate-50'}`}>
                                                        <div className={`w-12 h-12 flex items-center justify-center font-black rounded-xl text-2xl ${i === 0 ? 'bg-yellow-400 text-red-600' : 'bg-white text-slate-300'}`}>{i+1}</div>
                                                        <div className="text-4xl">{m.isAbsent ? "💤" : m.emoji}</div>
                                                        <div className="flex-1 font-black text-2xl">{isCapturing ? maskName(m.name) : m.name}</div>
                                                        <div className="text-4xl font-black text-[#0068B7] italic">{m.points} <span className="text-sm not-italic text-sky-300">PTS</span></div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    {activeTab === 'history' && (
                                        <div className="max-w-2xl mx-auto space-y-4">
                                            {(currentClass.history || []).map(log => (
                                                <div key={log.id} className="bg-white p-6 rounded-2xl shadow-md border-l-[10px] border-[#0068B7] flex justify-between items-center transition-transform hover:translate-x-2">
                                                    <div>
                                                        <div className="font-black text-lg">{isCapturing ? maskName(log.memberName) : log.memberName} <span className={log.amount > 0 ? "text-green-500" : log.amount < 0 ? "text-red-500" : "text-sky-500"}>{log.amount > 0 ? `+${log.amount}` : log.amount === 0 ? "歸零" : log.amount}</span></div>
                                                        <div className="text-slate-400 font-bold text-sm tracking-wide">{log.reason}</div>
                                                    </div>
                                                    <div className="text-right text-xs font-black text-slate-300">{log.timestamp}</div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* 刪除班級確認 */}
                    {classToDelete && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[5000] flex items-center justify-center p-6 animate-in fade-in">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl border-t-[10px] border-red-500 text-center">
                                <div className="text-6xl mb-4">🏫❌</div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">確定刪除班級？</h2>
                                <p className="text-slate-500 font-bold mb-8">將永久刪除「{classToDelete.name}」及其點數紀錄。</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setClassToDelete(null)} className="py-4 rounded-2xl bg-slate-100 text-slate-500 font-black">取消</button>
                                    <button onClick={handleDeleteClass} className="py-4 rounded-2xl bg-red-600 text-white font-black shadow-lg">確認刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 刪除學員確認 */}
                    {memberToDelete && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[5000] flex items-center justify-center p-6 animate-in fade-in">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl border-t-[10px] border-red-500 text-center">
                                <div className="text-6xl mb-4">👤❌</div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">確定刪除「{memberToDelete.name}」？</h2>
                                <p className="text-slate-500 font-bold mb-8">此操作將永久移除該名學員及其所有點數紀錄。</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setMemberToDelete(null)} className="py-4 rounded-2xl bg-slate-100 text-slate-500 font-black">取消</button>
                                    <button onClick={handleDeleteMember} className="py-4 rounded-2xl bg-red-600 text-white font-black shadow-lg">確認刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 確認重置點數 */}
                    {showResetConfirm && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[4000] flex items-center justify-center p-6 animate-in fade-in">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl border-t-[10px] border-red-500 text-center">
                                <div className="text-6xl mb-4">⚠️</div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">確定分數歸零？</h2>
                                <p className="text-slate-500 font-bold mb-8">此動作將把全班同學的分數重置為 0，且無法還原。</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setShowResetConfirm(false)} className="py-4 rounded-2xl bg-slate-100 text-slate-500 font-black">取消</button>
                                    <button onClick={handleResetPoints} className="py-4 rounded-2xl bg-red-600 text-white font-black shadow-lg shadow-red-200">確定歸零</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 新增班級彈窗 */}
                    {showAddClassModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[3000] flex items-center justify-center p-6 animate-in fade-in">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl border-t-[10px] border-yellow-400 relative">
                                <button onClick={() => setShowAddClassModal(false)} className="absolute top-4 right-4 p-2 text-slate-300 hover:text-red-500">
                                    <Icon name="x" size={24} />
                                </button>
                                <h2 className="text-2xl font-black text-[#0068B7] mb-6 text-center">建立新班級</h2>
                                <input 
                                    autoFocus
                                    type="text" 
                                    value={newClassName} 
                                    onChange={e => setNewClassName(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleAddClass()}
                                    placeholder="請輸入班級名稱..." 
                                    className="w-full px-6 py-4 rounded-2xl bg-slate-50 border-4 border-transparent focus:border-yellow-400 outline-none font-bold text-lg mb-6"
                                />
                                <button onClick={handleAddClass} className="w-full bg-[#E60012] text-white py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">確認建立</button>
                            </div>
                        </div>
                    )}

                    {/* 新增學員彈窗 */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[3000] flex items-center justify-center p-6 animate-in fade-in">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl border-t-[10px] border-sky-500 relative">
                                <button onClick={() => setShowAddModal(false)} className="absolute top-4 right-4 p-2 text-slate-300 hover:text-red-500">
                                    <Icon name="x" size={24} />
                                </button>
                                <h2 className="text-2xl font-black text-[#0068B7] mb-6 text-center">加入新學員</h2>
                                <input 
                                    autoFocus
                                    type="text" 
                                    value={newMemberName} 
                                    onChange={e => setNewMemberName(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleAddMember()}
                                    placeholder="請輸入姓名..." 
                                    className="w-full px-6 py-4 rounded-2xl bg-slate-50 border-4 border-transparent focus:border-sky-400 outline-none font-bold text-lg mb-6"
                                />
                                <button onClick={handleAddMember} className="w-full bg-sky-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">確認加入</button>
                            </div>
                        </div>
                    )}

                    {loading && (
                        <div className="loading-overlay z-[2000] bg-white/80 backdrop-blur-sm">
                            <div className="animate-spin text-[#0068B7]"><Icon name="rotate" size={48} /></div>
                            <div className="mt-4 font-black text-slate-500">更新雲端資料中...</div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
